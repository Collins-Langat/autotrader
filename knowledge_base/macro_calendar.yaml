# Macro Event Calendar
# High-impact scheduled events that the decision engine uses to block new positions.
# Update this file quarterly as new dates are released.
#
# Sources:
#   FOMC:  federalreserve.gov (announced ~1 year in advance)
#   CPI:   bls.gov/schedule  (announced ~1 year in advance)
#   NFP:   bls.gov/schedule  (first Friday of each month, sometimes shifted for holidays)
#
# Decision engine rule HR-010:
#   Do not open new short premium positions within 2 trading days before
#   any high-impact event that falls within the position's 45-day holding window.
#
# Impact levels:
#   high   - hard block (same as earnings)
#   medium - warning only, no block

events:

